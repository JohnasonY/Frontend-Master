<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Over</title>

<style>
:root {
  --bg: #8e8e8e;
  --panel: #f5f5f5;
  --border: #6b6b6b;
  --text: #111;
  --btn: #e6e6e6;
  --btnHover: #d6d6d6;
  --shadow: rgba(0, 0, 0, 0.25);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  display: grid;
  place-items: center;
  background: var(--bg);
  color: var(--text);
  font-family:
    system-ui,
    -apple-system,
    Segoe UI,
    Roboto,
    Arial,
    sans-serif;
}

.card {
  width: min(720px, 92vw);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 60px 28px 28px;
  box-shadow: 0 18px 40px var(--shadow);
  text-align: center;
}

.title {
  margin: 0;
  letter-spacing: 4px;
  font-size: clamp(48px, 6vw, 72px);
  font-weight: 900;
  color: #b00020;
  text-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}

.subtitle {
  margin: 20px auto 24px;
  font-size: 20px;
  font-weight: 600;
  opacity: 0.9;
}

.actions {
  display: grid;
  gap: 12px;
  justify-content: center;
}

.btn {
  width: 240px;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--btn);
  color: var(--text);
  font-size: 16px;
  font-weight: 650;
  cursor: pointer;
  transition: background 120ms ease, transform 80ms ease;
}

.btn:hover {
  background: var(--btnHover);
}

.btn:active {
  transform: translateY(1px);
}
</style>

</head>
<body>

<div class="card">
  <h1 class="title">GAME OVER</h1>

  <p class="subtitle" id="resultText">
    Player 1 wins! 🎉
  </p>

  <div class="actions">
    <button class="btn" id="newGameBtn">
      Start New Game
    </button>

    <button class="btn" id="homeBtn">
      Return to Homepage
    </button>
  </div>
</div>

<script>
// Example: read winner from URL like ?winner=Player%202
const params = new URLSearchParams(window.location.search);
const winner = params.get("winner");

if (winner) {
  document.getElementById("resultText").textContent =
    winner + " wins! 🎉";
}

// Demo actions — replace with your real routing
document.getElementById("newGameBtn").onclick = () => {
  alert("Start new game clicked (hook into GameManager)");
};

document.getElementById("homeBtn").onclick = () => {
  alert("Return home clicked");
};
</script>

</body>
</html>
